services:

  postgres:
    image: postgres:15
    container_name: vaultx_postgres
    environment:
      POSTGRES_DB: vaultx
      POSTGRES_USER: vaultx
      POSTGRES_PASSWORD: vaultx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultx"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vaultx_network

  redis:
    image: redis:7-alpine
    container_name: vaultx_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vaultx_network

  minio:
    image: minio/minio
    container_name: vaultx_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - vaultx_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vaultx_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://vaultx:vaultx@postgres:5432/vaultx
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - vaultx_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vaultx_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - vaultx_network

  nginx:
    image: nginx:alpine
    container_name: vaultx_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - vaultx_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  vaultx_network:
    driver: bridge
